name: imgest-mesh

# Local dev stack for Imgest-Mesh on Windows / macOS / Linux (Docker Desktop).
# CPU-only; inference runs in MOCK mode (random pass/fail). No GPU required.
#
# Data flow (via bind-mounted host dirs under ./.data/):
#   camera  -- writes frames --> .data/frames/
#   orchestrator -- watches .data/frames/ -- routes --> .data/routed/
#   inference -- watches .data/routed/ -- emits verdicts --> .data/results/json/
#   webserver -- serves dashboard --> http://localhost:8080
#
# Ports exposed to the host:
#   8000  docs (MkDocs Material site for Imgest-Mesh)
#   8001  jnj-armor-docs (linked MkDocs site for the JNJ-Armor sibling repo)
#   8080  webserver (dashboard UI)
#   8081  camera /status + /healthz
#   8082  orchestrator /status + /healthz
#   8083  inference /status + /healthz
#
# The jnj-armor-docs service builds against the sibling JNJ-Armor repo on
# the host. Path is resolved via JNJ_ARMOR_REPO_PATH (default
# ../T3-Accelerator-JNJ-Armor). See .env.example.

services:
  camera:
    build:
      context: ./resources/camera
      dockerfile: Containerfile
    image: imgest-mesh/camera:dev
    container_name: imgest-camera
    ports:
      - "8081:8081"
    volumes:
      - ./.data/frames:/opt/camera/output
      - ./.data/bmp-input:/opt/camera/bmp-input
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  orchestrator:
    build:
      context: ./resources/orchestrator
      dockerfile: Containerfile
    image: imgest-mesh/orchestrator:dev
    container_name: imgest-orchestrator
    ports:
      - "8082:8082"
    volumes:
      - ./.data/frames:/opt/orchestrator/input
      - ./.data/routed:/opt/orchestrator/output/inference-1
    depends_on:
      - camera
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  inference:
    build:
      context: ./resources/inference
      dockerfile: Containerfile
    image: imgest-mesh/inference:dev
    container_name: imgest-inference
    ports:
      - "8083:8083"
    volumes:
      - ./.data/routed:/opt/inference/input
      - ./.data/results/json:/opt/inference/output/json
      - ./.data/results/images:/opt/inference/output/images
    depends_on:
      - orchestrator
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8083/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  webserver:
    build:
      context: ./resources/webserver
      dockerfile: Containerfile
    image: imgest-mesh/webserver:dev
    container_name: imgest-webserver
    ports:
      - "8080:8080"
    restart: unless-stopped

  docs:
    build:
      context: .
      dockerfile: resources/docs/Containerfile
    image: imgest-mesh/docs:dev
    container_name: imgest-docs
    ports:
      - "8000:8080"
    restart: unless-stopped

  jnj-armor-docs:
    build:
      context: ${JNJ_ARMOR_REPO_PATH:-../T3-Accelerator-JNJ-Armor}
      dockerfile_inline: |
        FROM squidfunk/mkdocs-material AS build
        RUN pip install --no-cache-dir \
            mkdocs-macros-plugin \
            mkdocs-glightbox \
            mkdocs-mermaid2-plugin \
            mkdocs-charts-plugin \
            mkdocs-pdf \
            mkdocs-gallery \
            mkdocs-git-latest-changes-plugin \
            mkdocs-git-revision-date-localized-plugin \
            mkdocs-drawio-file
        WORKDIR /site
        COPY mkdocs.yml /site/mkdocs.yml
        COPY docs /site/docs
        COPY .git /site/.git
        # Strip repo_url / repo_name so the Material header has no GitLab
        # link in this demo. JNJ-Armor source is untouched; this rewrites
        # only the in-image copy at build time.
        RUN sed -i '/^repo_url:/d; /^repo_name:/d' /site/mkdocs.yml
        RUN mkdocs build -d /site/build
        FROM nginxinc/nginx-unprivileged:stable-alpine
        COPY --from=build /site/build /usr/share/nginx/html
        EXPOSE 8080
    image: imgest-mesh/jnj-armor-docs:dev
    container_name: imgest-jnj-armor-docs
    ports:
      - "8001:8080"
    restart: unless-stopped
