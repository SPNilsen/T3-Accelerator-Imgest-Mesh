apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: imgest-mesh
  labels:
    app: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: REGISTRY/imgest-mesh/orchestrator:latest  # TODO: set registry
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          volumeMounts:
            - name: data
              mountPath: /opt/orchestrator/input
              subPath: frames
            - name: data
              mountPath: /opt/orchestrator/output/inference-1
              subPath: routed
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: imgest-mesh-data
