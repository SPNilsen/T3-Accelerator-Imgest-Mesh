apiVersion: apps/v1
kind: Deployment
metadata:
  name: webserver
  namespace: imgest-mesh
  labels:
    app: webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webserver
  template:
    metadata:
      labels:
        app: webserver
    spec:
      containers:
        - name: webserver
          image: REGISTRY/imgest-mesh/webserver:latest  # TODO: set registry
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
