# Apply everything: kubectl apply -k k8s/
#
# Before applying, update all REGISTRY placeholders:
#   sed -i 's|REGISTRY|your.registry.example.com|g' k8s/*.yaml
# Or set the images block below:

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: imgest-mesh

resources:
  - namespace.yaml
  - pvc.yaml
  - configmap-camera.yaml
  - configmap-inference.yaml
  - deploy-camera.yaml
  - deploy-orchestrator.yaml
  - deploy-inference.yaml
  - deploy-webserver.yaml
  - deploy-docs.yaml
  - services.yaml

