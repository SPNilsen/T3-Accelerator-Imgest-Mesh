---
apiVersion: v1
kind: Service
metadata:
  name: camera
  namespace: imgest-mesh
spec:
  selector:
    app: camera
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: imgest-mesh
spec:
  selector:
    app: orchestrator
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: inference
  namespace: imgest-mesh
spec:
  selector:
    app: inference
  ports:
    - port: 8083
      targetPort: 8083
---
# Webserver is the user-facing service — exposed as NodePort.
# TODO: confirm nodePort value with your AI Pod network team, or
#       change type to LoadBalancer if a cloud LB is available.
apiVersion: v1
kind: Service
metadata:
  name: webserver
  namespace: imgest-mesh
spec:
  type: NodePort
  selector:
    app: webserver
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080   # TODO: adjust if 30080 is taken
---
apiVersion: v1
kind: Service
metadata:
  name: docs
  namespace: imgest-mesh
spec:
  type: NodePort
  selector:
    app: docs
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30000   # TODO: adjust if 30000 is taken
