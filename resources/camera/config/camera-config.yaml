service_name: camera
mode: demo-images

status:
  host: 0.0.0.0
  port: 8081

capture:
  interval_seconds: 2
  max_frames: 0   # 0 means run continuously

input:
  bmp_directory: /opt/camera/bmp-input   # bind-mounted from .data/bmp-input; falls back to placeholder text if empty

output:
  directory: /opt/camera/output
  filename_prefix: frame

storage:
  max_frames: 20
