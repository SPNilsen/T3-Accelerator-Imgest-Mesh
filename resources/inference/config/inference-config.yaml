service_name: inference
# mode is overridden by INFERENCE_MODE env var at runtime:
#   mock — random pass/fail (default, no GPU required)
#   real — TensorRT engine (requires MODEL_ENGINE_PATH + GPU)
mode: mock

status:
  host: 0.0.0.0
  port: 8083

model:
  name: demo-placeholder-model
  path: /opt/inference/models/model-placeholder.bin

storage:
  input_directory: /opt/inference/input
  json_output_directory: /opt/inference/output/json
  image_output_directory: /opt/inference/output/images
  max_frames: 20