<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Imgest-Mesh System Status</title>

<!-- Zero external HTTP requests — all styles inline, no CDN fonts or frameworks -->
<style>
/* ── Reset / Base ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: Arial, sans-serif;
    background: #f9fafb;
    color: #374151;
    min-height: 100vh;
}

/* ── Site Header ────────────────────────────────────────────────────── */
.site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: white;
    border-bottom: 1px solid #e5e7eb;
}

.site-header .logo img {
    width: 180px;
    display: block;
}

.header-nav {
    display: flex;
    gap: 8px;
    align-items: center;
}

.docs-link {
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #6b7280;
    text-decoration: none;
    padding: 6px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    background: white;
    transition: color 0.15s ease, border-color 0.15s ease;
}

.docs-link:hover,
.docs-link:focus-visible {
    color: #4f46e5;
    border-color: #4f46e5;
    outline: none;
}

/* ── Main Content / Dashboard Grid ─────────────────────────────────── */
.page-content {
    padding: 32px 24px;
    max-width: 1200px;
    margin: 0 auto;
}

.dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 1.5rem;
    align-items: stretch;
}

/* Row 1: pipeline bubbles — full width */
.row-pipeline {
    grid-column: 1 / -1;
}

/* ── Pipeline Strip (preserved from job-3) ──────────────────────────── */
.pipeline {
    margin-top: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    padding-top: 0;
}

.pipeline::before {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    top: 25px;
    transform: translateY(-50%);
    height: 4px;
    background: #d1d5db;
    z-index: 0;
}

.pipeline-progress {
    position: absolute;
    left: 0;
    top: 25px;
    transform: translateY(-50%);
    height: 4px;
    background: #4f46e5;
    z-index: 0;
    width: 0;
    transition: width 0.4s ease;
}

.step {
    position: relative;
    z-index: 1;
    text-align: center;
    width: 20%;
}

.circle {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 3px solid #9ca3af;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    color: #9ca3af;
    background: white;
}

.step.up .circle {
    background: #4f46e5;
    border-color: #4f46e5;
    color: white;
    cursor: pointer;
}

.step.starting .circle {
    border-style: dashed;
}

.step.down .circle {
    border-color: #9ca3af;
    color: #9ca3af;
}

.label {
    margin-top: 10px;
    font-size: 14px;
    font-weight: 600;
    color: #374151;
}

.status-text {
    margin-top: 6px;
    font-size: 12px;
    color: #6b7280;
}

/* Flow bubble animation (job-3) */
.flow-bubble {
    position: absolute;
    left: 0;
    top: 25px;
    width: 10px;
    height: 10px;
    margin-left: -5px;
    margin-top: -5px;
    border-radius: 50%;
    background: #a5b4fc;
    box-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 4px rgba(79,70,229,0.8);
    z-index: 0;
    pointer-events: none;
    animation: flow-bubble-travel 3000ms linear forwards;
    --flow-bubble-end: 0px;
}

@keyframes flow-bubble-travel {
    0%   { transform: translateX(0); opacity: 0; }
    8%   { opacity: 0.95; }
    92%  { opacity: 0.95; }
    100% { transform: translateX(var(--flow-bubble-end)); opacity: 0; }
}

@media (prefers-reduced-motion: reduce) {
    .flow-bubble { display: none; }
}

/* ── Detail Panels (Row 2) ──────────────────────────────────────────── */
.panel {
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.panel h3 {
    font-size: 14px;
    font-weight: 700;
    color: #111827;
    border-bottom: 1px solid #f3f4f6;
    padding-bottom: 8px;
    margin-bottom: 0;
}

.panel pre {
    max-height: 400px;
    overflow: auto;
    white-space: pre;
    font-family: ui-monospace, 'Courier New', monospace;
    font-size: 12px;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 4px;
    padding: 8px;
    flex: 1 1 auto;
}

/* Inference panel gets extra vertical room — it's the showpiece */
.panel-inference pre {
    max-height: 500px;
}

/* ── Camera Panel specific ──────────────────────────────────────────── */
.camera-thumb-link {
    display: block;
    text-decoration: none;
}

.camera-thumb-link img {
    max-width: 100%;
    border-radius: 4px;
    display: block;
}

.camera-placeholder {
    display: none;
    padding: 24px;
    text-align: center;
    color: #9ca3af;
    font-size: 13px;
    background: #f3f4f6;
    border-radius: 4px;
    border: 1px dashed #d1d5db;
}

.camera-caption {
    font-size: 12px;
    color: #6b7280;
    font-family: ui-monospace, 'Courier New', monospace;
}

.no-data {
    color: #9ca3af;
    font-style: italic;
    font-size: 13px;
}
</style>
</head>

<body>

<!-- Site Header: logo left + stubbed docs nav right -->
<header class="site-header">
    <div class="logo">
        <img src="t3-imgest-mesh.png" alt="Imgest-Mesh logo">
    </div>
    <nav class="header-nav" aria-label="Documentation links">
        <a class="docs-link" href="http://localhost:8000" target="_blank"
           rel="noopener noreferrer"
           title="Open Imgest-Mesh project documentation">
            Docs
        </a>
        <a class="docs-link" href="http://localhost:8001" target="_blank"
           rel="noopener noreferrer"
           title="Open the JNJ-Armor project documentation">
            JNJ-Armor Docs
        </a>
    </nav>
</header>

<main class="page-content">
    <div class="dashboard">

        <!-- ── Row 1: Pipeline bubbles (job-3, fully preserved) ──────── -->
        <section class="row-pipeline" aria-label="Pipeline service status">
            <div class="pipeline">
                <div class="pipeline-progress" id="pipeline-progress"></div>

                <!-- Camera step — inline SVG: camera lens/aperture -->
                <div class="step starting" id="camera-step">
                    <div class="circle" aria-label="Camera service">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                            <path d="M2 6a2 2 0 0 1 2-2h1.172a2 2 0 0 0 1.414-.586l.828-.828A2 2 0 0 1 8.828 2h2.344a2 2 0 0 1 1.414.586l.828.828A2 2 0 0 0 14.828 4H16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6zm10 4a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm-1 0a2 2 0 1 0-4 0 2 2 0 0 0 4 0z"/>
                        </svg>
                    </div>
                    <div class="label">Camera</div>
                    <div class="status-text" id="camera-status-text">Checking...</div>
                </div>

                <!-- Orchestrator step — inline SVG: stacked layers -->
                <div class="step starting" id="orchestrator-step">
                    <div class="circle" aria-label="Orchestrator service">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                            <path d="M2 4a1 1 0 0 1 1-1h14a1 1 0 1 1 0 2H3a1 1 0 0 1-1-1zM2 8a1 1 0 0 1 1-1h14a1 1 0 1 1 0 2H3a1 1 0 0 1-1-1zm0 4a1 1 0 0 1 1-1h14a1 1 0 1 1 0 2H3a1 1 0 0 1-1-1zm0 4a1 1 0 0 1 1-1h14a1 1 0 1 1 0 2H3a1 1 0 0 1-1-1z"/>
                        </svg>
                    </div>
                    <div class="label">Orchestrator</div>
                    <div class="status-text" id="orchestrator-status-text">Checking...</div>
                </div>

                <!-- Inference step — inline SVG: brain/circuit nodes -->
                <div class="step starting" id="inference-step">
                    <div class="circle" aria-label="Inference service">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                            <path d="M10 2a1 1 0 0 1 1 1v1.07A6.002 6.002 0 0 1 16 10a1 1 0 1 1-2 0 4 4 0 0 0-3-3.874V7a1 1 0 1 1-2 0v-.874A4 4 0 0 0 6 10a1 1 0 1 1-2 0 6.002 6.002 0 0 1 5-5.93V3a1 1 0 0 1 1-1zm-2 10a2 2 0 1 1 4 0 2 2 0 0 1-4 0zm-4 4a1 1 0 0 1 1-1h10a1 1 0 1 1 0 2H5a1 1 0 0 1-1-1z"/>
                        </svg>
                    </div>
                    <div class="label">Inference</div>
                    <div class="status-text" id="inference-status-text">Checking...</div>
                </div>

                <!-- System Mgr step — inline SVG: gear -->
                <div class="step starting" id="systemmgr-step">
                    <div class="circle" aria-label="System Manager service">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                            <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 0 1-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 0 1 .947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 0 1 2.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 0 1 2.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 0 1 .947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 0 1-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 0 1-2.287-.947zM10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <div class="label">System Mgr</div>
                </div>

                <!-- Compressor step — inline SVG: archive box -->
                <div class="step starting" id="compressor-step">
                    <div class="circle" aria-label="Compressor service">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                            <path d="M4 3a2 2 0 0 0-2 2v2h16V5a2 2 0 0 0-2-2H4z"/>
                            <path fill-rule="evenodd" d="M18 9H2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9zM8 13a1 1 0 0 1 1-1h2a1 1 0 1 1 0 2H9a1 1 0 0 1-1-1z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <div class="label">Compressor</div>
                </div>

            </div><!-- /.pipeline -->
        </section><!-- /.row-pipeline -->

        <!-- ── Row 2, Col 1: Camera Panel ───────────────────────────── -->
        <article class="panel panel-camera" aria-labelledby="camera-panel-title">
            <h3 id="camera-panel-title">Camera</h3>

            <!-- Live thumbnail — links to full BMP -->
            <a id="camera-frame-link"
               href="http://localhost:8081/latest-frame"
               target="_blank"
               rel="noopener noreferrer"
               class="camera-thumb-link"
               aria-label="Open latest camera frame (BMP) in new tab">
                <img id="camera-thumb"
                     src="http://localhost:8081/latest-thumb?t=0"
                     alt="Latest camera frame thumbnail">
            </a>

            <!-- Fallback shown when camera is unreachable -->
            <div class="camera-placeholder" id="camera-placeholder" role="status" aria-live="polite">
                Camera not reachable
            </div>

            <!-- Caption: filename / type / size / timestamp from recent_files[0] -->
            <div class="camera-caption" id="camera-caption" aria-live="polite"></div>
        </article>

        <!-- ── Row 2, Col 2: Orchestrator Panel ─────────────────────── -->
        <article class="panel panel-orchestrator" aria-labelledby="orchestrator-panel-title">
            <h3 id="orchestrator-panel-title">Orchestrator</h3>
            <pre id="orchestrator-detail" aria-live="polite"><span class="no-data">No data yet</span></pre>
        </article>

        <!-- ── Row 2, Col 3: Inference Panel (showpiece) ────────────── -->
        <article class="panel panel-inference" aria-labelledby="inference-panel-title">
            <h3 id="inference-panel-title">Inference</h3>
            <pre id="inference-detail" aria-live="polite"><span class="no-data">No data yet</span></pre>
        </article>

    </div><!-- /.dashboard -->
</main>

<script>
"use strict";

/* ── Constants ──────────────────────────────────────────────────────── */
const STATUS_REFRESH_MS = 10000;

const CAMERA_URL       = "http://localhost:8081/status";
const ORCHESTRATOR_URL = "http://localhost:8082/status";
const INFERENCE_URL    = "http://localhost:8083/status";

/* ── JSON formatter ─────────────────────────────────────────────────── */
function formatJson(obj) {
    return JSON.stringify(obj, null, 2);
}

/* ── Pipeline progress (job-3, preserved exactly) ───────────────────── */
function updatePipelineProgress(activeStepId) {
    const pipeline   = document.querySelector(".pipeline");
    const progress   = document.getElementById("pipeline-progress");
    const activeStep = document.getElementById(activeStepId);

    if (!pipeline || !progress || !activeStep) return;

    const pipelineRect = pipeline.getBoundingClientRect();
    const circle       = activeStep.querySelector(".circle");
    const circleRect   = circle.getBoundingClientRect();
    const centerX      = circleRect.left + (circleRect.width / 2) - pipelineRect.left;
    progress.style.width = `${centerX}px`;
}

function resetPipelineProgress() {
    document.getElementById("pipeline-progress").style.width = "0";
}

function refreshPipelineProgress() {
    if (document.getElementById("inference-step").classList.contains("up")) {
        updatePipelineProgress("inference-step");
    } else if (document.getElementById("orchestrator-step").classList.contains("up")) {
        updatePipelineProgress("orchestrator-step");
    } else if (document.getElementById("camera-step").classList.contains("up")) {
        updatePipelineProgress("camera-step");
    } else if (document.getElementById("inference-step").classList.contains("starting")) {
        updatePipelineProgress("inference-step");
    } else if (document.getElementById("orchestrator-step").classList.contains("starting")) {
        updatePipelineProgress("orchestrator-step");
    } else if (document.getElementById("camera-step").classList.contains("starting")) {
        updatePipelineProgress("camera-step");
    } else {
        resetPipelineProgress();
    }
    updateFlowEndpoint();
}

/* ── Flow bubble animation (job-3, preserved exactly) ───────────────── */
const FLOW_BUBBLE_INTERVAL_MS = 1500;
let flowEndX  = 0;
let flowTimer = null;

function computeFlowEndX() {
    const pipeline = document.querySelector(".pipeline");
    if (!pipeline) return 0;
    const pipelineRect          = pipeline.getBoundingClientRect();
    const orderedUpCandidates   = ["inference-step", "orchestrator-step", "camera-step"];
    for (const id of orderedUpCandidates) {
        const step = document.getElementById(id);
        if (step && step.classList.contains("up")) {
            const circle = step.querySelector(".circle");
            const rect   = circle.getBoundingClientRect();
            return rect.left + rect.width / 2 - pipelineRect.left;
        }
    }
    return 0;
}

function updateFlowEndpoint() {
    const newX = computeFlowEndX();
    if (Math.abs(newX - flowEndX) < 1) return;
    flowEndX = newX;
    document.querySelectorAll(".flow-bubble").forEach(b => b.remove());
}

function spawnFlowBubble() {
    if (document.visibilityState === "hidden") return;
    if (flowEndX <= 0) return;
    const pipeline = document.querySelector(".pipeline");
    if (!pipeline) return;
    const bubble = document.createElement("div");
    bubble.className = "flow-bubble";
    bubble.style.setProperty("--flow-bubble-end", `${flowEndX}px`);
    bubble.addEventListener("animationend", () => bubble.remove());
    pipeline.appendChild(bubble);
}

function startFlowBubbles() {
    if (flowTimer !== null) return;
    flowTimer = setInterval(spawnFlowBubble, FLOW_BUBBLE_INTERVAL_MS);
    spawnFlowBubble();
}

function stopFlowBubbles() {
    if (flowTimer !== null) {
        clearInterval(flowTimer);
        flowTimer = null;
    }
    document.querySelectorAll(".flow-bubble").forEach(b => b.remove());
}

document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
        stopFlowBubbles();
    } else {
        updateFlowEndpoint();
        if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
            startFlowBubbles();
        }
    }
});

window.addEventListener("resize", updateFlowEndpoint);

/* ── Camera panel update ─────────────────────────────────────────────── */
function updateCameraPanel(data) {
    const thumb       = document.getElementById("camera-thumb");
    const link        = document.getElementById("camera-frame-link");
    const placeholder = document.getElementById("camera-placeholder");
    const caption     = document.getElementById("camera-caption");

    // Camera reachable — show thumb, hide placeholder
    thumb.style.display = "block";
    link.style.display  = "block";
    placeholder.style.display = "none";

    // Cache-bust the thumbnail on every poll cycle
    thumb.src = `http://localhost:8081/latest-thumb?t=${Date.now()}`;

    const recent = data && data.recent_files && data.recent_files[0];
    if (recent) {
        const size = recent.filesize != null
            ? `${(recent.filesize / 1024).toFixed(1)} KB`
            : "—";
        const ts   = recent.ts ? recent.ts.replace("T", " ").replace(/\.\d+.*$/, " UTC") : "—";
        caption.textContent = `${recent.filename || "—"}  ·  ${recent.file_type || "—"}  ·  ${size}  ·  ${ts}`;
    } else {
        caption.textContent = "No frames received yet";
    }
}

function showCameraUnreachable() {
    const thumb       = document.getElementById("camera-thumb");
    const link        = document.getElementById("camera-frame-link");
    const placeholder = document.getElementById("camera-placeholder");
    const caption     = document.getElementById("camera-caption");

    thumb.style.display       = "none";
    link.style.display        = "none";
    placeholder.style.display = "block";
    caption.textContent       = "";
}

// Handle broken image (404 from /latest-thumb)
document.getElementById("camera-thumb").addEventListener("error", function () {
    this.style.display = "none";
    document.getElementById("camera-placeholder").style.display = "block";
});

/* ── Orchestrator panel update ──────────────────────────────────────── */
function updateOrchestratorPanel(data) {
    const pre    = document.getElementById("orchestrator-detail");
    const recent = data && data.recent_files && data.recent_files[0];
    if (!recent) {
        pre.innerHTML = '<span class="no-data">No data yet</span>';
        return;
    }
    const subset = {
        filename: recent.filename,
        routed_to: recent.routed_to,
        ts: recent.ts,
        pipeline: recent.metadata && recent.metadata.pipeline
            ? recent.metadata.pipeline
            : (recent.pipeline || null),
    };
    pre.textContent = formatJson(subset);
}

/* ── Inference panel update ─────────────────────────────────────────── */
function updateInferencePanel(data) {
    const pre    = document.getElementById("inference-detail");
    const recent = data && data.recent_results && data.recent_results[0];
    if (!recent) {
        pre.innerHTML = '<span class="no-data">No data yet</span>';
        return;
    }
    const subset = {
        filename:   recent.filename,
        verdict:    recent.verdict,
        confidence: recent.confidence,
        ts:         recent.ts,
        pipeline:   recent.metadata && recent.metadata.pipeline
            ? recent.metadata.pipeline
            : (recent.pipeline || null),
    };
    pre.textContent = formatJson(subset);
}

/* ── Service status + pipeline step update ──────────────────────────── */
async function updateServiceStatus(stepId, statusTextId, url, serviceName, panelCallback) {
    const step       = document.getElementById(stepId);
    const statusText = document.getElementById(statusTextId);

    try {
        const response = await fetch(url);
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        step.classList.remove("up", "starting", "down");

        if (data.state === "running") {
            step.classList.add("up");
            if (statusText) statusText.textContent = "Running";
        } else if (data.state === "starting") {
            step.classList.add("starting");
            if (statusText) statusText.textContent = "Starting...";
        } else {
            step.classList.add("down");
            if (statusText) statusText.textContent = `State: ${data.state}`;
        }

        if (panelCallback) panelCallback(data);

    } catch (error) {
        step.classList.remove("up", "starting", "down");
        step.classList.add("down");
        if (statusText) statusText.textContent = "Not reachable";
        console.error(`${serviceName} status check failed:`, error);

        if (panelCallback === updateCameraPanel) {
            showCameraUnreachable();
        }
    }

    refreshPipelineProgress();
}

function registerStepClick(stepId, url) {
    document.getElementById(stepId).addEventListener("click", function () {
        if (this.classList.contains("up")) {
            window.open(url, "_blank");
        }
    });
}

/* ── Master poll ────────────────────────────────────────────────────── */
function refreshAllStatuses() {
    updateServiceStatus("camera-step", "camera-status-text", CAMERA_URL, "Camera", updateCameraPanel);
    updateServiceStatus("orchestrator-step", "orchestrator-status-text", ORCHESTRATOR_URL, "Orchestrator", updateOrchestratorPanel);
    updateServiceStatus("inference-step", "inference-status-text", INFERENCE_URL, "Inference", updateInferencePanel);
}

/* ── Bootstrap ──────────────────────────────────────────────────────── */
refreshAllStatuses();
setInterval(refreshAllStatuses, STATUS_REFRESH_MS);

registerStepClick("camera-step",       CAMERA_URL);
registerStepClick("orchestrator-step", ORCHESTRATOR_URL);
registerStepClick("inference-step",    INFERENCE_URL);

if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
    startFlowBubbles();
}
</script>

</body>
</html>
