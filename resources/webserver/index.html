<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Imgest-Mesh System Status</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
    font-family: Arial, sans-serif;
    background:#f9fafb;
    text-align:center;
    margin:0;
    padding:40px;
}

.logo img {
    width:75%;
}

.pipeline {
    margin-top:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:relative;
    max-width:900px;
    margin-left:auto;
    margin-right:auto;
}

.pipeline {
    margin-top:60px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    position:relative;
    max-width:900px;
    margin-left:auto;
    margin-right:auto;
    padding-top:0;
}

/* base gray line */
.pipeline::before {
    content:'';
    position:absolute;
    left:0;
    right:0;
    top:25px;
    transform:translateY(-50%);
    height:4px;
    background:#d1d5db;
    z-index:0;
}

/* purple progress overlay */
.pipeline-progress {
    position:absolute;
    left:0;
    top:25px;
    transform:translateY(-50%);
    height:4px;
    background:#4f46e5;
    z-index:0;
    width:0;
    transition:width 0.4s ease;
}

.step {
    position:relative;
    z-index:1;
    text-align:center;
    width:20%;
}

.circle {
    width:50px;
    height:50px;
    border-radius:50%;
    border:3px solid #9ca3af;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto;
    font-size:20px;
    color:#9ca3af;
    background:white;
}

.step.up .circle {
    background:#4f46e5;
    border-color:#4f46e5;
    color:white;
}

.step.starting .circle {
    border-style:dashed;
}

.step.down .circle {
    border-color:#9ca3af;
    color:#9ca3af;
}

.label {
    margin-top:10px;
    font-size:14px;
    font-weight:600;
    color:#374151;
}

.status-text {
    margin-top:6px;
    font-size:12px;
    color:#6b7280;
}

.step.up .circle {
    background:#4f46e5;
    border-color:#4f46e5;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="logo">
<img src="t3-imgest-mesh.png" style="width:200px"><br><br>
</div>

<div class="pipeline">

<div class="pipeline-progress" id="pipeline-progress"></div>

<div class="step starting" id="camera-step">
    <div class="circle">
        <i class="fa-solid fa-cube"></i>
    </div>
    <div class="label">Camera</div>
    <div class="status-text" id="camera-status-text">Checking...</div>
</div>

<div class="step starting" id="orchestrator-step">
    <div class="circle">
        <i class="fa-solid fa-cube"></i>
    </div>
    <div class="label">Orchestrator</div>
</div>

<div class="step starting" id="inference-step">
    <div class="circle">
        <i class="fa-solid fa-cubes"></i>
    </div>
    <div class="label">Inference</div>
</div>

<div class="step starting" id="systemmgr-step">
    <div class="circle">
        <i class="fa-solid fa-cube"></i>
    </div>
    <div class="label">System Mgr</div>
</div>

<div class="step starting" id="compressor-step">
    <div class="circle">
        <i class="fa-solid fa-cube"></i>
    </div>
    <div class="label">Compressor</div>
</div>

</div>

<script>

function updatePipelineProgress(activeStepId) {
    const pipeline = document.querySelector(".pipeline");
    const progress = document.getElementById("pipeline-progress");
    const activeStep = document.getElementById(activeStepId);

    if (!pipeline || !progress || !activeStep) return;

    const pipelineRect = pipeline.getBoundingClientRect();
    const stepRect = activeStep.getBoundingClientRect();
    const circle = activeStep.querySelector(".circle");
    const circleRect = circle.getBoundingClientRect();

    const centerX = circleRect.left + (circleRect.width / 2) - pipelineRect.left;
    progress.style.width = `${centerX}px`;
}

async function updateCameraStatus() {
    const step = document.getElementById("camera-step");
    const statusText = document.getElementById("camera-status-text");

    try {
        const response = await fetch("http://localhost:8081/status");
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        step.classList.remove("up", "starting", "down");
        if (data.state === "running") {
            step.classList.add("up");
            statusText.textContent = `Running (${data.frames_emitted} frames)`;
            updatePipelineProgress("camera-step");
        } else if (data.state === "starting") {
            step.classList.add("starting");
            statusText.textContent = "Starting...";
            updatePipelineProgress("camera-step");
        } else {
            step.classList.add("down");
            statusText.textContent = `State: ${data.state}`;
            document.getElementById("pipeline-progress").style.width = "0";
        }

    } catch (error) {
        step.classList.remove("up", "starting", "down");
        step.classList.add("down");
        statusText.textContent = "Not reachable";
        console.error("Camera status check failed:", error);

        document.getElementById("pipeline-progress").style.width = "0";
    }
}

updateCameraStatus();
setInterval(updateCameraStatus, 3000);

document.getElementById("camera-step").addEventListener("click", function () {

    const step = document.getElementById("camera-step");

    if (step.classList.contains("up")) {
        window.open("http://localhost:8081/status", "_blank");
    }

});


</script>

</body>
</html>
