<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Imgest-Mesh System Status</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body {
    font-family: Arial, sans-serif;
    background:#f9fafb;
    text-align:center;
    margin:0;
    padding:40px;
}

.logo img {
    width:75%;
}

/* STATUS BAR */

.pipeline {
    margin-top:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:relative;
    max-width:900px;
    margin-left:auto;
    margin-right:auto;
}

/* connecting line */

.pipeline::before {
    content:'';
    position:absolute;
    top:25px;
    left:0;
    right:0;
    height:4px;
    background:#d1d5db;
    z-index:0;
}

.step {
    position:relative;
    z-index:1;
    text-align:center;
    width:20%;
}

.circle {
    width:50px;
    height:50px;
    border-radius:50%;
    border:3px solid #9ca3af;   /* gray */
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto;
    font-size:20px;
    color:#9ca3af;              /* gray icon */
    background:white;
}

/* active / healthy */

.step.up .circle {
    background:#4f46e5;
    color:white;
}

/* starting */

.step.starting .circle {
    border-style:dashed;
}

/* down */

.step.down .circle {
    border-color:#9ca3af;
    color:#9ca3af;
}

/* step labels */

.label {
    margin-top:10px;
    font-size:14px;
    font-weight:600;
    color:#374151;
}

</style>
</head>

<body>

<div class="logo">
<img src="t3-imgest-mesh.png" style="width:200px"><br><br>
</div>

<div class="pipeline">

<div class="step starting">
<div class="circle">
<i class="fa-solid fa-camera"></i>
</div>
<div class="label">Camera</div>
</div>

<div class="step starting">
<div class="circle">
<i class="fa-solid fa-gears"></i>
</div>
<div class="label">Orchestrator</div>
</div>

<div class="step starting">
<div class="circle">
<i class="fa-solid fa-brain"></i>
</div>
<div class="label">Inference</div>
</div>

<div class="step starting">
<div class="circle">
<i class="fa-solid fa-server"></i>
</div>
<div class="label">System Mgr</div>
</div>

<div class="step starting">
<div class="circle">
<i class="fa-solid fa-file-zipper"></i>
</div>
<div class="label">Compressor</div>
</div>

</div>

</body>
</html>
